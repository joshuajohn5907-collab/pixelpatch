<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelPatch - Stickers Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Press Start 2P', cursive; background:#111; color:#fff; text-align:center; }
    header { padding:40px 20px; background:linear-gradient(90deg,#ff4d6d,#5f9cff); }
    header h1 { font-size:28px; }
    .hero { padding:50px 20px; }
    .btn { background:#00ffcc; color:#000; padding:12px 20px; text-decoration:none; border-radius:8px; display:inline-block; margin-top:20px; }
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:40px; }
    .card { background:#222; padding:15px; border-radius:12px; }
    .card img { width:100%; border-radius:10px; }
    footer { padding:20px; background:#000; font-size:10px; }
  </style>
</head>
<body>

<header>
  <h1>PixelPatch</h1>

</header>

<section id="products" class="products">

  <!-- Sticker 1 -->

  <!-- Sticker 3 -->

  <!-- Sticker 4 -->
  <div class="card">

    <h3>ChatGPT This</h3>
    <p>₹99</p>
  </div>

  <!-- Sticker 5 -->
  <div class="card">
    <img src="stickers 1.jpg" alt="Verified Sticker">
    <h3>Verified Coffee Addict</h3>
    <p>₹99</p>
  </div>

  <!-- Sticker 6 -->
  <div class="card">
    <img src="stickers 1.jpg" alt="Good Boy Sticker">
    <h3>Good Boy</h3>
    <p>₹99</p>
  </div>

</section>

<footer>
  <p>© 2026 PixelPatch. All Rights Reserved.</p>
</footer>

</html>
